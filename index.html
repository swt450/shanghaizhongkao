<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>上海中考志愿分数速查</title>
    <meta
      name="description"
      content="上海中考名额到区、名额到校、平行志愿历年分数查询与学校选择参考。"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div id="districtGate" class="district-gate">
      <div class="gate-panel">
        <p class="eyebrow">上海中考志愿</p>
        <h1>先选择所在区</h1>
        <label class="select-field">
          <span>所在区</span>
          <select id="gateDistrictSelect">
            <option value="">请选择</option>
          </select>
        </label>
        <button id="enterButton" class="primary-button" type="button" disabled>进入查询</button>
      </div>
    </div>

    <div id="appShell" class="app-shell is-hidden">
      <header class="app-header">
        <button id="backButton" class="icon-button" type="button" aria-label="返回">‹</button>
        <div>
          <p class="eyebrow" id="headerEyebrow">历年分数查询</p>
          <h1 id="headerTitle">选择入口</h1>
        </div>
        <button id="changeDistrictButton" class="district-button" type="button">换区</button>
      </header>

      <main>
        <section id="homeView" class="view is-active" aria-live="polite">
          <section class="district-summary">
            <span id="selectedDistrictName">-</span>
            <strong>所在区已选择</strong>
          </section>

          <section class="entry-grid" aria-label="功能入口">
            <button class="entry-card" type="button" data-section="history">
              <span>历年分数查询</span>
              <strong>查名额到区、名额到校、平行志愿</strong>
              <small>适合先把三类录取分数线查清楚</small>
            </button>
            <button class="entry-card accent" type="button" data-section="choice">
              <span>学校选择</span>
              <strong>看名额能不能走，再排平行</strong>
              <small>分数对比、平行历年、报校建议</small>
            </button>
          </section>
        </section>

        <section id="workView" class="view" aria-live="polite">
          <nav id="subTabs" class="tabs" aria-label="子页面"></nav>

          <section class="controls" aria-label="筛选">
            <label class="search-box">
              <span>⌕</span>
              <input id="searchInput" type="search" placeholder="搜高中" autocomplete="off" />
            </label>
            <div class="filter-row">
              <label>
                <span>年份</span>
                <select id="yearSelect"></select>
              </label>
              <label>
                <span>最低分</span>
                <input id="scoreInput" type="number" inputmode="decimal" placeholder="不限" />
              </label>
            </div>
            <label id="juniorField" class="select-field is-hidden">
              <span>所在初中</span>
              <input id="juniorInput" type="search" list="juniorOptions" placeholder="输入初中关键词" autocomplete="off" />
              <datalist id="juniorOptions"></datalist>
            </label>
          </section>

          <div id="pageIntro" class="page-intro"></div>
          <div class="section-head">
            <h2 id="listTitle">-</h2>
            <span id="resultCount"></span>
          </div>
          <div id="resultList" class="card-list"></div>
        </section>
      </main>

      <footer class="app-footer">
        <p>名额到区、名额到校分数按总表中的考试分口径展示；同分时请结合英语、语数外、语文、数学等排序信息。</p>
      </footer>
    </div>

    <script src="./data.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
